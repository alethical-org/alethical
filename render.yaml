services:
  - type: web
    name: alethical-api
    runtime: python
    plan: free
    region: virginia
    buildCommand: uv sync --frozen
    startCommand: uv run uvicorn alethical.api.main:create_app --factory --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - alethical/**
        - scripts/**
        - pyproject.toml
        - uv.lock
        - .python-version
        - render.yaml
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: UV_VERSION
        value: 0.10.2
      - key: ALETHICAL_CORS_ORIGINS
        value: https://alethical-web.vercel.app,http://localhost:19006,http://127.0.0.1:19006
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false

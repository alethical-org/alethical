services:
  db:
    image: pgvector/pgvector:pg17
    container_name: alethical-db
    environment:
      POSTGRES_DB: alethical
      POSTGRES_USER: alethical
      POSTGRES_PASSWORD: alethical
    ports:
      - "${DB_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alethical -d alethical"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - alethical-postgres:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: alethical-backend
    working_dir: /app
    environment:
      DATABASE_URL: ${BACKEND_DATABASE_URL:-${DATABASE_URL:-postgresql+psycopg://alethical:alethical@db:5432/alethical}}
      ALETHICAL_DATABASE_TARGET: ${ALETHICAL_DATABASE_TARGET:-local}
      ALETHICAL_DEV_AUTH_TOKEN: local-dev-token
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_PROJECT_REF: ${SUPABASE_PROJECT_REF:-}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-}
      SUPABASE_POOLER_HOST: ${SUPABASE_POOLER_HOST:-aws-1-us-east-2.pooler.supabase.com}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
      ALETHICAL_CORS_ORIGINS: ${ALETHICAL_CORS_ORIGINS:-http://localhost:19006,http://127.0.0.1:19006}
      ALETHICAL_SKIP_MIGRATIONS: ${ALETHICAL_SKIP_MIGRATIONS:-}
      UV_PROJECT_ENVIRONMENT: /tmp/alethical-venv
      UV_PYTHON: /usr/local/bin/python3.12
    command: >
      sh -c "uv sync --frozen &&
             if [ \"$${ALETHICAL_DATABASE_TARGET}\" = \"production\" ]; then export DATABASE_URL=\"postgresql+psycopg://postgres.$${SUPABASE_PROJECT_REF}:$${SUPABASE_DB_PASSWORD}@$${SUPABASE_POOLER_HOST}:6543/postgres?sslmode=require\"; fi &&
             if [ \"$${ALETHICAL_SKIP_MIGRATIONS}\" != \"1\" ]; then uv run python -m alembic -c alembic.ini upgrade head; fi &&
             uv run uvicorn alethical.api.main:create_app --factory --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - .:/app
      - backend-venv:/tmp/alethical-venv
      - uv-cache:/root/.cache/uv
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    image: node:22-bookworm-slim
    container_name: alethical-frontend
    working_dir: /app
    environment:
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:8000}
      EXPO_PUBLIC_SUPABASE_URL: ${EXPO_PUBLIC_SUPABASE_URL:-}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
      BROWSER: none
    command: >
      sh -c "corepack enable &&
             corepack prepare pnpm@10.33.0 --activate &&
             pnpm install --frozen-lockfile &&
             pnpm --dir apps/frontend exec expo start --web --port 19006 --clear"
    ports:
      - "${FRONTEND_PORT:-19006}:19006"
    volumes:
      - .:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  alethical-postgres:
  backend-venv:
  uv-cache:
  frontend-node-modules:

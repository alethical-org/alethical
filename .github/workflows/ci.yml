name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - ".github/workflows/ci.yml"
              - ".python-version"
              - "alembic.ini"
              - "alethical/**"
              - "pyproject.toml"
              - "scripts/**"
              - "uv.lock"
            frontend:
              - ".github/workflows/ci.yml"
              - "apps/frontend/**"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"

  backend:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: alethical
          POSTGRES_USER: alethical
          POSTGRES_PASSWORD: alethical
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alethical -d alethical"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://alethical:alethical@localhost:5432/alethical
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --frozen

      # Guard against multiple Alembic heads: when two branches each add a
      # migration off the same parent, `alembic upgrade head` (incl. the prod
      # migrate-on-merge) fails. Catch it here at PR time — three such
      # collisions happened during #486 (#500/#508 vs #489) and only surfaced
      # in manual checks. DB-free (reads the migration scripts).
      - name: Check single migration head
        run: |
          heads=$(uv run alembic heads 2>/dev/null | grep -c '(head)')
          echo "alembic heads: $heads"
          if [ "$heads" -ne 1 ]; then
            echo "::error::Multiple Alembic heads — rebase your migration to chain after the current head so prod migrate-on-merge doesn't break."
            uv run alembic heads
            exit 1
          fi

      # Pin ruff: uvx resolves the latest release, so a new ruff (0.16.0 expanded
      # the default rule set) turned green CI red repo-wide with no code change.
      # Pin to a known-good version; bump deliberately when adopting new rules.
      - name: Lint backend
        run: uvx ruff@0.15.0 check alethical scripts

      - name: Format check backend
        run: uvx ruff@0.15.0 format --check alethical scripts

      # Pin ty like ruff (#614): uvx resolves the latest release, and ty is
      # pre-1.0 (changes fast), so an unpinned upgrade could break CI repo-wide
      # with no code change. Bump deliberately.
      - name: Type check backend
        run: uvx ty@0.0.63 check alethical/db

      - name: Test backend
        run: uv run pytest

  frontend:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      - name: Type check frontend
        run: pnpm exec tsc --noEmit

      - name: Format check frontend
        run: pnpm exec prettier --check .

      - name: Build frontend
        run: pnpm run build

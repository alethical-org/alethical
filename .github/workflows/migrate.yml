name: Migrate database

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "alethical/alembic/**"
      - "alethical/db/models.py"
      - "alembic.ini"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/migrate.yml"

concurrency:
  group: production-database-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    # Build the production URL from the same Supabase inputs the app uses
    # (alembic env.py -> database_url_for_target), so there is no separate
    # DATABASE_URL copy of the password to rotate out of date (#288).
    env:
      ALETHICAL_DATABASE_TARGET: production
      SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check migration secrets are set
        run: test -n "$SUPABASE_PROJECT_URL" && test -n "$SUPABASE_DB_PASSWORD"

      - name: Run Alembic migrations
        run: uv run python -m alembic -c alembic.ini upgrade head

name: Deploy to Vercel

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/vercel-deploy.yml"
      - "apps/frontend/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "vercel.json"
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_GIT_AUTHOR_NAME: ${{ secrets.VERCEL_GIT_AUTHOR_NAME }}
      VERCEL_GIT_AUTHOR_EMAIL: ${{ secrets.VERCEL_GIT_AUTHOR_EMAIL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Vercel secrets
        run: |
          : "${VERCEL_ORG_ID:?Missing VERCEL_ORG_ID secret}"
          : "${VERCEL_PROJECT_ID:?Missing VERCEL_PROJECT_ID secret}"
          : "${VERCEL_TOKEN:?Missing VERCEL_TOKEN secret}"
          : "${VERCEL_GIT_AUTHOR_NAME:?Missing VERCEL_GIT_AUTHOR_NAME secret}"
          : "${VERCEL_GIT_AUTHOR_EMAIL:?Missing VERCEL_GIT_AUTHOR_EMAIL secret}"

      - name: Override HEAD author for Vercel Hobby deploys
        run: |
          git config user.name "$VERCEL_GIT_AUTHOR_NAME"
          git config user.email "$VERCEL_GIT_AUTHOR_EMAIL"
          git commit --amend --no-edit --no-gpg-sign --author="$VERCEL_GIT_AUTHOR_NAME <$VERCEL_GIT_AUTHOR_EMAIL>"

      - name: Deploy production to Vercel
        run: npx --yes vercel@54.4.1 deploy --prod --yes --archive=tgz --token="$VERCEL_TOKEN"

name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check Vercel secrets
        run: |
          : "${VERCEL_ORG_ID:?Missing VERCEL_ORG_ID secret}"
          : "${VERCEL_PROJECT_ID:?Missing VERCEL_PROJECT_ID secret}"
          : "${VERCEL_TOKEN:?Missing VERCEL_TOKEN secret}"

      - name: Deploy production to Vercel
        run: npx --yes vercel@54.4.1 deploy --prod --yes --token="$VERCEL_TOKEN"
